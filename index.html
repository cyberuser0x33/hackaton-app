<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f1f3f4;
            --card: #ffffff;
            --text: #202124;
            --border: #dadce0;
            --warning: #d93025;
            --radius: 16px;

            /* Category Colors */
            --cat-study: #e8f0fe;
            --cat-ent: #fce8f3;
            --cat-sport: #e6fffa;
            --cat-food: #fef7e0;
            --cat-house: #f3e8fd;
            --cat-serv: #eafff6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #e4e7eb;
            padding: 4px;
            border-radius: var(--radius);
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: transparent;
            font-weight: 500;
            color: #5f6368;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--card);
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Card */
        .card {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 1px 2px rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #3c4043;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            background: #fff;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Subscription List */
        .filter-bar {
            margin-bottom: 15px;
        }

        .sub-item {
            padding: 16px;
            border-bottom: 1px solid #f1f3f4;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .sub-item:last-child {
            border-bottom: none;
        }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Category Badge Colors */
        .cat-study {
            background: #d2e3fc;
            color: #1967d2;
        }

        .cat-ent {
            background: #f8d7da;
            color: #a71d2a;
        }

        .cat-sport {
            background: #ccfbf1;
            color: #0f766e;
        }

        .cat-food {
            background: #feebc8;
            color: #9c4221;
        }

        .cat-house {
            background: #e9d8fd;
            color: #6b46c1;
        }

        .cat-serv {
            background: #c6f6d5;
            color: #22543d;
        }

        .sub-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sub-name {
            font-weight: 600;
            font-size: 16px;
        }

        .sub-price {
            font-weight: 700;
            color: #202124;
        }

        .sub-details {
            font-size: 13px;
            color: #5f6368;
        }

        .warning {
            color: var(--warning);
            font-weight: 600;
            font-size: 12px;
            margin-top: 4px;
        }

        .is-urgent {
            border-left: 5px solid var(--warning);
            padding-left: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add', this)">Add Subscription</button>
            <button class="tab-btn" onclick="switchTab('list', this)">Subscriptions</button>
            <button class="tab-btn" onclick="switchTab('stats', this)">Overview</button>
        </div>

        <!-- ADD SECTION -->
        <div id="add" class="content-section active">
            <div class="card">
                <h2>New Subscription</h2>
                <div class="form-group">
                    <label>Service Name</label>
                    <input type="text" id="name" placeholder="e.g. Netflix">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="study">Study</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="sport">Sport</option>
                        <option value="food">Food</option>
                        <option value="household">Household</option>
                        <option value="services">Services</option>
                    </select>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Price ($)</label>
                        <input type="number" id="price" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Period</label>
                        <select id="period">
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Next Payment Date</label>
                    <input type="date" id="expiryDate">
                </div>

                <div class="form-group">
                    <label>Comment</label>
                    <textarea id="comment" rows="2" placeholder="Note..."></textarea>
                </div>

                <button class="main-btn" onclick="saveSubscription()">Save Subscription</button>
            </div>
        </div>

        <!-- LIST SECTION -->
        <div id="list" class="content-section">
            <div class="filter-bar">
                <select id="filterCategory" onchange="renderList()">
                    <option value="all">All Categories</option>
                    <option value="study">Study</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="sport">Sport</option>
                    <option value="food">Food</option>
                    <option value="household">Household</option>
                    <option value="services">Services</option>
                </select>
            </div>
            <div class="card" id="listContainer" style="padding: 0;">
                <!-- Items injected here -->
            </div>
        </div>

        <!-- STATS SECTION -->
        <div id="stats" class="content-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <label>Monthly Total</label>
                    <div id="totalM" class="stat-val">$0.00</div>
                </div>
                <div class="stat-card">
                    <label>Yearly Total</label>
                    <div id="totalY" class="stat-val">$0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let subscriptions = JSON.parse(localStorage.getItem('subs_data')) || [];

        function switchTab(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if (id !== 'add') renderList();
        }

        function saveSubscription() {
            const data = {
                id: Date.now(),
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                period: document.getElementById('period').value,
                expiry: document.getElementById('expiryDate').value,
                comment: document.getElementById('comment').value
            };

            if (!data.name || isNaN(data.price) || !data.expiry) {
                alert("Fill in name, price and date!");
                return;
            }

            subscriptions.push(data);
            localStorage.setItem('subs_data', JSON.stringify(subscriptions));
            alert("Success!");

            // Reset form
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('expiryDate').value = '';

            switchTab('list', document.querySelectorAll('.tab-btn')[1]);
        }

        function deleteSubscription(id) {
            if (confirm("Are you sure you want to delete this subscription?")) {
                subscriptions = subscriptions.filter(s => s.id !== id);
                localStorage.setItem('subs_data', JSON.stringify(subscriptions));
                renderList();
            }
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}.${y}`; // Forced dd.mm.yyyy format
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            const filter = document.getElementById('filterCategory').value;
            container.innerHTML = "";

            // Global Sorting: Closest date first
            let displayed = [...subscriptions].sort((a, b) => new Date(a.expiry) - new Date(b.expiry));

            // Filtering
            if (filter !== 'all') {
                displayed = displayed.filter(s => s.category === filter);
            }

            let totalMonthly = 0;
            let totalYearly = 0;

            displayed.forEach(sub => {
                const mPrice = sub.period === 'monthly' ? sub.price : sub.price / 12;
                const yPrice = sub.period === 'yearly' ? sub.price : sub.price * 12;
                totalMonthly += mPrice;
                totalYearly += yPrice;

                const daysLeft = Math.ceil((new Date(sub.expiry) - new Date()) / (1000 * 60 * 60 * 24));
                const isUrgent = daysLeft >= 0 && daysLeft <= 3;

                const item = document.createElement('div');
                item.className = `sub-item ${isUrgent ? 'is-urgent' : ''}`;
                item.innerHTML = `
                <div class="sub-main">
                    <span class="sub-name">${sub.name}</span>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="sub-price">$${sub.price.toFixed(2)}</span>
                        <button onclick="deleteSubscription(${sub.id})" style="background: none; border: none; cursor: pointer; padding: 0; font-size: 16px; opacity: 0.6; transition: opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'" title="Delete">🗑️</button>
                    </div>
                </div>
                <div>
                    <span class="badge cat-${sub.category}">${sub.category}</span>
                    ${sub.freq ? `<span style="font-size: 12px; color: #888; margin-left: 8px;">• ${sub.freq}</span>` : ''}
                </div>
                <div class="sub-details">
                    Payment: ${formatDate(sub.expiry)} (${sub.period})
                </div>
                ${isUrgent ? `<div class="warning">⚠ Payment due in ${daysLeft} days!</div>` : ''}
                ${sub.comment ? `<div style="font-size: 12px; color: #80868b; margin-top: 4px;">"${sub.comment}"</div>` : ''}
            `;
                container.appendChild(item);
            });

            document.getElementById('totalM').innerText = `$${totalMonthly.toFixed(2)}`;
            document.getElementById('totalY').innerText = `$${totalYearly.toFixed(2)}`;

            if (displayed.length === 0) {
                container.innerHTML = `<p style="padding: 20px; text-align: center; color: #888;">No subscriptions found.</p>`;
            }
        }

        // Initial load
        window.onload = renderList;
    </script>

</body>

</html>
